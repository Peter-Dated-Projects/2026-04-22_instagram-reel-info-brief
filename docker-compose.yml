services:
  db:
    image: postgres:16-alpine
    container_name: reelbrief-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: reelbrief
      POSTGRES_PASSWORD: reelbrief
      POSTGRES_DB: reelbrief
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
